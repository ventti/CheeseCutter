name: Deploy User Guide

on:
  push:
    branches:
      - develop
    paths:
      - "guide/**"
      - "Version"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The guide's version comes from the repo-root Version file (single source
      # of truth) — expose it to Jekyll as site.version so guide/README.md never
      # goes stale. Append rather than overwrite in case a _config.yml is added.
      - name: Inject version into Jekyll config
        run: echo "version: \"$(cat Version)\"" >> guide/_config.yml

      - name: Build guide
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./guide
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
