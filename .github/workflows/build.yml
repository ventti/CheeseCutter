name: Build binaries

on:
  push:
    branches: [develop, master]
    paths:
      - "src/**"
      - "Makefile*"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "Makefile*"
      - ".github/workflows/build.yml"
  # Publishing a release rebuilds from the tagged commit and attaches the
  # per-platform binaries to that release (see the "release" job).
  release:
    types: [published]
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64 (ldc, msvc)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install LDC (MSVC-target)
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: Install make + SDL2 (vcpkg)
        run: |
          choco install make --no-progress -y
          vcpkg install sdl2:x64-windows
          echo "SDL2_PREFIX=${VCPKG_INSTALLATION_ROOT}/installed/x64-windows" >> "$GITHUB_ENV"

      - name: Tool versions
        run: |
          ldc2 --version | head -3
          clang --version | head -1
          make --version | head -1

      - name: Use committed C64 player.bin (no acme on Windows)
        run: touch src/c64/player.bin

      - name: Build
        run: |
          make -f Makefile.win release \
            SDL2_INC="${SDL2_PREFIX}/include" \
            SDL2_LIBDIR="${SDL2_PREFIX}/lib"

      - name: Package
        run: |
          mkdir -p dist
          cp ccutter.exe ct2util.exe dist/
          # SDL2.dll is the only mandatory runtime DLL; libcurl is loaded lazily
          # by Phobos only if the Ultimate-hardware feature is used.
          cp "${SDL2_PREFIX}/bin/SDL2.dll" dist/
          cp README.md LICENSE.md dist/ 2>/dev/null || true
          cp -r tunes dist/tunes
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheesecutter-win64
          path: dist

  linux:
    name: Linux x64 (ldc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ldc acme libsdl2-dev libcurl4-openssl-dev g++ make

      - name: Build
        run: make -j release

      - name: Package
        run: |
          mkdir -p dist
          cp ccutter ct2util dist/
          cp README.md LICENSE.md dist/ 2>/dev/null || true
          cp -r tunes dist/tunes
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheesecutter-linux64
          path: dist

  macos:
    name: macOS (Apple Silicon, ldc)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldc acme sdl2

      - name: Build
        run: make -j -f Makefile.mac release LIBSPATH="$(brew --prefix)/lib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheesecutter-macos
          path: CheeseCutter-Extended.app

  # On a published release, gather the three platform builds, package them with
  # versioned names and attach them to that release.
  release:
    name: Attach binaries to release
    if: github.event_name == 'release'
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per-platform archives
        run: |
          set -eu
          # Release tag is ext-v<version>; strip the prefix for asset names.
          VER="${GITHUB_REF_NAME#ext-v}"
          cd artifacts
          # Windows: ccutter.exe + ct2util.exe + SDL2.dll + tunes/docs.
          mv cheesecutter-win64 "cheesecutter-${VER}-win64"
          zip -rq "../cheesecutter-${VER}-win64.zip" "cheesecutter-${VER}-win64"
          # Linux: restore exec bits lost in the artifact, then tar.
          chmod +x cheesecutter-linux64/ccutter cheesecutter-linux64/ct2util
          mv cheesecutter-linux64 "cheesecutter-${VER}-linux64"
          tar czf "../cheesecutter-${VER}-linux64.tar.gz" "cheesecutter-${VER}-linux64"
          # macOS: the artifact holds the .app's contents; rewrap the bundle.
          mkdir -p CheeseCutter-Extended.app
          mv cheesecutter-macos/Contents CheeseCutter-Extended.app/
          find CheeseCutter-Extended.app/Contents/MacOS -type f -exec chmod +x {} \;
          zip -rq "../cheesecutter-${VER}-macos.zip" CheeseCutter-Extended.app

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cheesecutter-*-win64.zip
            cheesecutter-*-linux64.tar.gz
            cheesecutter-*-macos.zip
